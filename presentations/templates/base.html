<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} First_Faults_GUI</title>

    <!-- Bootstrap CDN (quick, good-looking) -->
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link
            crossorigin="anonymous"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            integrity="sha384-..."
            rel="stylesheet"
    >

    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('plc.home') }}">First Faults GUI</a>
        <button aria-controls="topnav" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler"
                data-bs-target="#topnav" data-bs-toggle="collapse" type="button">

            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="topnav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link {% if title=='Home' %}active{% endif %}"
                                        href="{{ url_for('plc.home') }}">Home</a></li>

                <li class="nav-item"><a class="nav-link {% if title=='Diagrams' %}active{% endif %}"
                                        href="{{ url_for('plc.diagrams') }}">Diagrams</a></li>

                <li class="nav-item"><a class="nav-link {% if title=='Table Tree' %}active{% endif %}"
                                        href="{{ url_for('plc.table_tree') }}">Tables</a></li>
                <li class="nav-item"><a class="nav-link {% if title=='About' %}active{% endif %}"
                                        href="{{ url_for('plc.about') }}">About</a></li>
                <li class="nav-item"><a class="nav-link {% if title=='Contact' %}active{% endif %}"
                                        href="{{ url_for('plc.contact') }}">Contact</a></li>

            </ul>
            <span class="navbar-text ms-auto">
            user : {{ session.username or 'Guest' }} &nbsp; Role : {{ session.role or 'GUEST' }}
          </span>
        </div>

    </div>
</nav>

<div class="container my-4">
    {% block content %}{% endblock %}
</div>

<!-- Global Loading Overlay -->
<div class="loading-overlay" id="global-loading-overlay">
    <div class="loading-content">
        <div class="loading-spinner"></div>
        <p>Loading...</p>
    </div>
</div>

<style>
    .loading-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        justify-content: center;
        align-items: center;
    }
    .loading-overlay.active {
        display: flex;
    }
    .loading-content {
        background: white;
        padding: 40px 60px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .loading-spinner {
        width: 80px;
        height: 80px;
        border: 8px solid #e0e0e0;
        border-top: 8px solid #007bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px auto;
    }
    .loading-content p {
        margin: 0;
        font-size: 18px;
        color: #333;
        font-weight: 500;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<script>
    (function () {
        const overlay = document.getElementById("global-loading-overlay");

        // Show spinner when clicking any nav link (covers page transitions)
        document.querySelectorAll("a.nav-link, a.navbar-brand").forEach(function (link) {
            link.addEventListener("click", function () {
                overlay.classList.add("active");
            });
        });

        // Show spinner on any form submit
        document.addEventListener("submit", function () {
            overlay.classList.add("active");
        });
    })();
</script>

<!-- Bootstrap JS (for navbar toggling) -->
<script crossorigin="anonymous" integrity="sha384-..."
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
