# config.yml
#todo configuration file
app:
  name: my-app
  environment: development
  version: 0.1.0

server:
  host: 0.0.0.0
  port: 8080

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"

database:
  engine: sqlite
  url: sqlite:///data.db

features:
  feature_x: false
  feature_y: true

secrets:
  api_key: "${API_KEY}"
  db_password: "${DB_PASSWORD}"